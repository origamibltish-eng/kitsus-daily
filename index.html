<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Character Identity</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;
background:white;
color:black;
}

/* MENU */

#menu{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:30px;
}

button{
padding:25px 90px;
font-size:26px;
border:1px solid black;
background:white;
color:black;
cursor:pointer;
}

/* CHARACTER PAGE */

#character{
display:none;
height:100vh;
justify-content:center;
align-items:center;
text-align:left;
font-size:22px;
line-height:1.9;
padding:40px;
gap:40px;
}

/* BACK BUTTON */

#back{
position:absolute;
right:40px;
top:40px;
padding:15px 40px;
font-size:20px;
border:1px solid black;
background:white;
color:black;
cursor:pointer;
}

</style>
</head>

<body>

<div id="menu">

<button onclick="show('kitsu')">Kitsu</button>
<button onclick="show('nyx')">Thvenoir</button>
<button onclick="show('ard')">Ard</button>
<button onclick="show('naloe')">Naloe</button>

</div>

<div id="character"></div>

<button id="back" onclick="back()">Back</button>

<script>

function show(name){

document.getElementById("menu").style.display="none";

let c = document.getElementById("character");
c.style.display="flex";

document.getElementById("back").style.display="block";

if(name==="kitsu"){
c.innerHTML=`
Real Name: Yevgenyevich Slovascki<br>
Noble Identity: Fistrovis Garavilye<br>
Nickname: Kitsu<br>
Age: 31 (born May 3, 1995)<br>
Height: 210 cm<br>
Weight: 97 kg<br>
Title: Duke of the East, nicknamed the Northern Duke<br>
Origin: Russia
`;
}

if(name==="nyx"){
c.innerHTML=`
Real Name: Nyx Thvenoir<br>
Former Mafia Boss<br>
Age: 48 (born November 2, 1978)<br>
Height: 192 cm<br>
Weight: 76 kg<br>
Origin: United States
`;
}

if(name==="ard"){
c.innerHTML=`
Real Name: Patriot de Routh Ard<br>
Former Noble (Baron, 5% true noble blood), now a Mafia member<br>
Age: 50 (born February 4, 1976)<br>
Height: 206 cm<br>
Weight: 84 kg<br>
Origin: England
`;
}

if(name==="naloe"){
c.innerHTML=`
Real Name: Naell Thvenoir<br>
Sniper, works at a flower shop<br>
Age: 29 (born June 8, 1997)<br>
Height: 182 cm<br>
Weight: 65 kg<br>
Origin: United States
`;
}

}

function back(){

document.getElementById("menu").style.display="flex";
document.getElementById("character").style.display="none";
document.getElementById("back").style.display="none";

}

</script>

</body>
  </html>
