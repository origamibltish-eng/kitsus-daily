<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three Quest Mini Quiz</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    text-align: center;
    transition: background-color 0.5s;
    background-color: #BBDEFB;
  }
  .screen {
    display: none;
    height: 100vh;
    padding-top: 20vh;
  }
  button {
    padding: 15px 30px;
    margin: 15px;
    font-size: 18px;
    cursor: pointer;
  }
  #result {
    margin-top: 50px;
    font-size: 24px;
    font-weight: bold;
  }
</style>
</head>
<body>

<div id="q1" class="screen">
  <p>1. Do you love me?</p>
  <button onclick="answer(1,'yes')">Yes</button>
  <button onclick="answer(1,'no')">No</button>
</div>

<div id="q2" class="screen">
  <p>2. Do you need me?</p>
  <button onclick="answer(2,'yes')">Yes</button>
  <button onclick="answer(2,'no')">No</button>
</div>

<div id="q3" class="screen">
  <p>3. Are you happy today?</p>
  <button onclick="answer(3,'yes')">Yes</button>
  <button onclick="answer(3,'no')">No</button>
</div>

<h2 id="result"></h2>

<script>
let answers = {};
let currentQ = 1;

function showScreen(qNum) {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  document.getElementById('q' + qNum).style.display = 'block';
}

// Set initial screen
showScreen(currentQ);

function answer(qNum, ans) {
  answers[qNum] = ans;

  // Change PAPPER color
  if(ans === 'yes') {
    document.body.style.backgroundColor = '#FFFFFF';
  } else {
    document.body.style.backgroundColor = '#FF5555';
  }

  // Hide clicked buttons
  document.getElementById('q' + qNum).querySelectorAll('button').forEach(b => b.style.display = 'none');

  // Move to next question
  if(currentQ < 3) {
    currentQ++;
    setTimeout(() => { showScreen(currentQ); }, 500); // small delay for PAPPER change effect
  } else {
    // Show result after all questions answered
    let resultText = '';
    if(answers[1] === 'yes' && answers[2] === 'yes') {
      resultText = "Let's get married 💍";
    } else if(answers[1] === 'no' && answers[2] === 'no') {
      resultText = "You will die tomorrow 🙄 (jk)";
    } else {
      resultText = "I'll consider it 🤔";
    }
    document.getElementById('result').textContent = resultText;
  }
}
</script>

</body>
    </html>
