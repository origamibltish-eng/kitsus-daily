<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Character Identity</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:white;
transition:0.4s;
}

#menu{
display:flex;
gap:15px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:6px;
cursor:pointer;
background:#eaeaea;
}

#content{
color:white;
font-size:20px;
line-height:1.9;
text-align:center;
max-width:600px;
}

</style>
</head>

<body>

<div id="menu">
<button onclick="showCharacter('kitsu')">Kitsu</button>
<button onclick="showCharacter('nyx')">Thvenoir</button>
<button onclick="showCharacter('ard')">Ard</button>
<button onclick="showCharacter('naloe')">Naloe</button>
</div>

<div id="content"></div>

<script>

function showCharacter(char){

document.getElementById("menu").style.display="none";

let text="";
let color="";

if(char==="kitsu"){
color="#98ffcc";
text=`
Real Name: Yevgenyevich Slovascki<br>
Noble Identity: Fistrovis Garavilye<br>
Nickname: Kitsu<br>
Age: 31 (born May 3, 1995)<br>
Height: 210 cm<br>
Weight: 97 kg<br>
Title: Duke of the East, nicknamed the Northern Duke<br>
Origin: Russia
`;
}

if(char==="nyx"){
color="black";
text=`
Real Name: Nyx Thvenoir<br>
Former Mafia Boss<br>
Age: 48 (born November 2, 1978)<br>
Height: 192 cm<br>
Weight: 76 kg<br>
Origin: United States
`;
}

if(char==="ard"){
color="#40E0D0";
text=`
Real Name: Patriot de Routh Ard<br>
Former Noble (Baron, 5% true noble blood), now a Mafia member<br>
Age: 50 (born February 4, 1976)<br>
Height: 206 cm<br>
Weight: 84 kg<br>
Origin: England
`;
}

if(char==="naloe"){
color="#5a2a82";
text=`
Real Name: Naell Thvenoir<br>
Sniper, works at a flower shop<br>
Age: 29 (born June 8, 1997)<br>
Height: 182 cm<br>
Weight: 65 kg<br>
Origin: United States
`;
}

document.body.style.background=color;
document.getElementById("content").innerHTML=text;

}

</script>

</body>
  </html>
